name: Build Project by Detected Language
description: Installs dependencies and builds the project for Node, Java, Go, Python, PHP, or Rust

inputs:
  language:
    description: Detected language
    required: true
  node_version:
    description: Node.js version override
    required: false
    default: ""
  java_version:
    description: Java version override
    required: false
    default: "21"
  go_version:
    description: Go version override
    required: false
    default: ""
  python_version:
    description: Python version override
    required: false
    default: ""
  php_version:
    description: PHP version override
    required: false
    default: "8.2"
  rust_version:
    description: Rust toolchain version override
    required: false
    default: "stable"

runs:
  using: composite
  steps:
    # ── Node.js ──────────────────────────────────────────────────────────────
    - name: Resolve Node.js version from .nvmrc or .node-version
      id: node-version
      if: inputs.language == 'node'
      shell: bash
      run: |
        VERSION="${{ inputs.node_version }}"
        if [ -z "$VERSION" ] && [ -f ".nvmrc" ]; then
          VERSION=$(cat .nvmrc | tr -d 'v\n')
        elif [ -z "$VERSION" ] && [ -f ".node-version" ]; then
          VERSION=$(cat .node-version | tr -d 'v\n')
        elif [ -z "$VERSION" ] && [ -f "package.json" ]; then
          VERSION=$(node -e "try{const e=require('./package.json');const v=e.engines&&e.engines.node;if(v){const m=v.match(/[\d]+\.[\d]+\.[\d]+|[\d]+/);print(m?m[0]:'')}catch(e){}" 2>/dev/null || echo "")
        fi
        VERSION=${VERSION:-"20"}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      if: inputs.language == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.node-version.outputs.version }}
        cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || hashFiles('yarn.lock') != '' && 'yarn' || hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || '' }}

    - name: Setup pnpm
      if: inputs.language == 'node' && hashFiles('pnpm-lock.yaml') != ''
      uses: pnpm/action-setup@v3
      with:
        run_install: false

    - name: Install Node.js dependencies and build
      if: inputs.language == 'node'
      shell: bash
      run: |
        if [ -f "pnpm-lock.yaml" ]; then
          pnpm install --frozen-lockfile
          pnpm run build --if-present
        elif [ -f "yarn.lock" ]; then
          yarn install --frozen-lockfile
          yarn build --if-present 2>/dev/null || true
        else
          npm ci --prefer-offline
          npm run build --if-present
        fi

    # ── Java ─────────────────────────────────────────────────────────────────
    - name: Setup Java
      if: inputs.language == 'java'
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java_version }}
        distribution: temurin
        cache: ${{ hashFiles('pom.xml') != '' && 'maven' || 'gradle' }}

    - name: Build with Maven
      if: inputs.language == 'java' && hashFiles('pom.xml') != ''
      shell: bash
      run: mvn -B package -DskipTests --no-transfer-progress

    - name: Build with Gradle
      if: inputs.language == 'java' && hashFiles('build.gradle', 'build.gradle.kts') != ''
      shell: bash
      run: |
        chmod +x gradlew 2>/dev/null || true
        ./gradlew build -x test --no-daemon 2>/dev/null || gradle build -x test --no-daemon

    # ── Go ───────────────────────────────────────────────────────────────────
    - name: Resolve Go version from go.mod
      id: go-version
      if: inputs.language == 'go'
      shell: bash
      run: |
        VERSION="${{ inputs.go_version }}"
        if [ -z "$VERSION" ] && [ -f "go.mod" ]; then
          VERSION=$(grep '^go ' go.mod | awk '{print $2}' | head -1)
        fi
        echo "version=${VERSION:-"1.22"}" >> $GITHUB_OUTPUT

    - name: Setup Go
      if: inputs.language == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: true

    - name: Build Go project
      if: inputs.language == 'go'
      shell: bash
      run: go build ./...

    # ── Python ───────────────────────────────────────────────────────────────
    - name: Resolve Python version from .python-version
      id: python-version
      if: inputs.language == 'python'
      shell: bash
      run: |
        VERSION="${{ inputs.python_version }}"
        if [ -z "$VERSION" ] && [ -f ".python-version" ]; then
          VERSION=$(cat .python-version | tr -d '\n')
        fi
        echo "version=${VERSION:-"3.12"}" >> $GITHUB_OUTPUT

    - name: Setup Python
      if: inputs.language == 'python'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.python-version.outputs.version }}
        cache: ${{ hashFiles('requirements.txt', 'Pipfile.lock', 'poetry.lock') != '' && 'pip' || '' }}

    - name: Install Python dependencies
      if: inputs.language == 'python'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "poetry.lock" ]; then
          pip install poetry && poetry install --no-interaction
        elif [ -f "Pipfile" ]; then
          pip install pipenv && pipenv install --deploy
        elif [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        elif [ -f "pyproject.toml" ]; then
          pip install .
        fi

    # ── PHP ──────────────────────────────────────────────────────────────────
    - name: Setup PHP
      if: inputs.language == 'php'
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        extensions: mbstring, xml, ctype, json, curl, dom
        coverage: none

    - name: Install PHP dependencies via Composer
      if: inputs.language == 'php'
      shell: bash
      run: |
        if [ -f "composer.lock" ]; then
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
        else
          composer update --no-interaction --prefer-dist --optimize-autoloader --no-dev
        fi

    # ── Rust ─────────────────────────────────────────────────────────────────
    - name: Setup Rust toolchain
      if: inputs.language == 'rust'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust_version }}

    - name: Cache Rust build artifacts
      if: inputs.language == 'rust'
      uses: Swatinem/rust-cache@v2

    - name: Build Rust project
      if: inputs.language == 'rust'
      shell: bash
      run: cargo build --release
