name: Auto Pipeline

on:
  workflow_call:
    inputs:
      deploy_target:
        description: "Deploy target (ssh-build, docker-compose, s3-cloudfront, rsync, k8s, helm, vercel, netlify, fly-io, railway)"
        type: string
        required: false
        default: ""
      deploy_host:
        description: "SSH host for ssh-based deploys"
        type: string
        required: false
        default: ""
      deploy_user:
        description: "SSH user for ssh-based deploys"
        type: string
        required: false
        default: "deploy"
      deploy_path:
        description: "Remote path for ssh/rsync deploys"
        type: string
        required: false
        default: "/var/www/app"
      deploy_port:
        description: "SSH port"
        type: string
        required: false
        default: "22"
      docker_image:
        description: "Docker image name (registry/name:tag)"
        type: string
        required: false
        default: ""
      docker_registry:
        description: "Docker registry URL"
        type: string
        required: false
        default: "ghcr.io"
      k8s_namespace:
        description: "Kubernetes namespace"
        type: string
        required: false
        default: "default"
      helm_chart:
        description: "Helm chart name or path"
        type: string
        required: false
        default: "./helm"
      helm_release:
        description: "Helm release name"
        type: string
        required: false
        default: ""
      s3_bucket:
        description: "S3 bucket name"
        type: string
        required: false
        default: ""
      cloudfront_id:
        description: "CloudFront distribution ID"
        type: string
        required: false
        default: ""
      skip_tests:
        description: "Skip test stage"
        type: boolean
        required: false
        default: false
      skip_lint:
        description: "Skip lint stage"
        type: boolean
        required: false
        default: false
      skip_security:
        description: "Skip security scan stage"
        type: boolean
        required: false
        default: false
      skip_docker:
        description: "Skip docker build stage"
        type: boolean
        required: false
        default: false
      node_version:
        description: "Override Node.js version"
        type: string
        required: false
        default: ""
      java_version:
        description: "Override Java version"
        type: string
        required: false
        default: "21"
      go_version:
        description: "Override Go version"
        type: string
        required: false
        default: ""
      python_version:
        description: "Override Python version"
        type: string
        required: false
        default: ""
      php_version:
        description: "Override PHP version"
        type: string
        required: false
        default: "8.2"
      rust_version:
        description: "Override Rust version"
        type: string
        required: false
        default: "stable"
    secrets:
      SSH_PRIVATE_KEY:
        required: false
      SSH_KNOWN_HOSTS:
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      KUBECONFIG:
        required: false
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false
      NETLIFY_AUTH_TOKEN:
        required: false
      NETLIFY_SITE_ID:
        required: false
      FLY_API_TOKEN:
        required: false
      RAILWAY_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

jobs:
  detect:
    name: Detect Language & Config
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.detect.outputs.language }}
      deploy_target: ${{ steps.config.outputs.deploy_target }}
      deploy_host: ${{ steps.config.outputs.deploy_host }}
      deploy_user: ${{ steps.config.outputs.deploy_user }}
      deploy_path: ${{ steps.config.outputs.deploy_path }}
      deploy_port: ${{ steps.config.outputs.deploy_port }}
      docker_image: ${{ steps.config.outputs.docker_image }}
      docker_registry: ${{ steps.config.outputs.docker_registry }}
      k8s_namespace: ${{ steps.config.outputs.k8s_namespace }}
      helm_chart: ${{ steps.config.outputs.helm_chart }}
      helm_release: ${{ steps.config.outputs.helm_release }}
      s3_bucket: ${{ steps.config.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.config.outputs.cloudfront_id }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect language
        id: detect
        uses: docaohieu2808/reusable-workflows/actions/detect@master

      - name: Merge .ci.yml config with inputs
        id: config
        shell: bash
        run: |
          # Parse .ci.yml if it exists
          CI_FILE=".ci.yml"
          read_ci() {
            local key="$1"
            if [ -f "$CI_FILE" ]; then
              python3 -c "
import sys, re
try:
    content = open('$CI_FILE').read()
    # simple key: value extraction
    m = re.search(r'^${key}:\s*(.+)$', content, re.MULTILINE)
    print(m.group(1).strip().strip('\"').strip(\"'\")) if m else print('')
except: print('')
" 2>/dev/null || echo ""
            fi
          }

          # Input overrides .ci.yml; .ci.yml overrides defaults
          resolve() {
            local input_val="$1"
            local ci_key="$2"
            local default_val="$3"
            if [ -n "$input_val" ]; then
              echo "$input_val"
            else
              local ci_val
              ci_val=$(read_ci "$ci_key")
              if [ -n "$ci_val" ]; then
                echo "$ci_val"
              else
                echo "$default_val"
              fi
            fi
          }

          DEPLOY_TARGET=$(resolve "${{ inputs.deploy_target }}" "deploy_target" "")
          DEPLOY_HOST=$(resolve "${{ inputs.deploy_host }}" "deploy_host" "")
          DEPLOY_USER=$(resolve "${{ inputs.deploy_user }}" "deploy_user" "deploy")
          DEPLOY_PATH=$(resolve "${{ inputs.deploy_path }}" "deploy_path" "/var/www/app")
          DEPLOY_PORT=$(resolve "${{ inputs.deploy_port }}" "deploy_port" "22")
          DOCKER_IMAGE=$(resolve "${{ inputs.docker_image }}" "docker_image" "")
          DOCKER_REGISTRY=$(resolve "${{ inputs.docker_registry }}" "docker_registry" "ghcr.io")
          K8S_NAMESPACE=$(resolve "${{ inputs.k8s_namespace }}" "k8s_namespace" "default")
          HELM_CHART=$(resolve "${{ inputs.helm_chart }}" "helm_chart" "./helm")
          HELM_RELEASE=$(resolve "${{ inputs.helm_release }}" "helm_release" "")
          S3_BUCKET=$(resolve "${{ inputs.s3_bucket }}" "s3_bucket" "")
          CLOUDFRONT_ID=$(resolve "${{ inputs.cloudfront_id }}" "cloudfront_id" "")

          # Auto docker image name from repo if not set
          if [ -z "$DOCKER_IMAGE" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            DOCKER_IMAGE="${DOCKER_REGISTRY}/${REPO_NAME}:${{ github.sha }}"
          fi

          # Auto helm release from repo name if not set
          if [ -z "$HELM_RELEASE" ]; then
            HELM_RELEASE=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          fi

          echo "deploy_target=${DEPLOY_TARGET}" >> $GITHUB_OUTPUT
          echo "deploy_host=${DEPLOY_HOST}" >> $GITHUB_OUTPUT
          echo "deploy_user=${DEPLOY_USER}" >> $GITHUB_OUTPUT
          echo "deploy_path=${DEPLOY_PATH}" >> $GITHUB_OUTPUT
          echo "deploy_port=${DEPLOY_PORT}" >> $GITHUB_OUTPUT
          echo "docker_image=${DOCKER_IMAGE}" >> $GITHUB_OUTPUT
          echo "docker_registry=${DOCKER_REGISTRY}" >> $GITHUB_OUTPUT
          echo "k8s_namespace=${K8S_NAMESPACE}" >> $GITHUB_OUTPUT
          echo "helm_chart=${HELM_CHART}" >> $GITHUB_OUTPUT
          echo "helm_release=${HELM_RELEASE}" >> $GITHUB_OUTPUT
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          echo "cloudfront_id=${CLOUDFRONT_ID}" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: docaohieu2808/reusable-workflows/actions/build@master
        with:
          language: ${{ needs.detect.outputs.language }}
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          go_version: ${{ inputs.go_version }}
          python_version: ${{ inputs.python_version }}
          php_version: ${{ inputs.php_version }}
          rust_version: ${{ inputs.rust_version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist/
            build/
            target/
            out/
            public/
            .next/
            vendor/
          retention-days: 1
          if-no-files-found: ignore

  test-and-lint:
    name: Test & Lint
    needs: [detect, build]
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests || !inputs.skip_lint }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Test & Lint
        uses: docaohieu2808/reusable-workflows/actions/test@master
        with:
          language: ${{ needs.detect.outputs.language }}
          skip_tests: ${{ inputs.skip_tests }}
          skip_lint: ${{ inputs.skip_lint }}
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          go_version: ${{ inputs.go_version }}
          python_version: ${{ inputs.python_version }}
          php_version: ${{ inputs.php_version }}
          rust_version: ${{ inputs.rust_version }}

  security-scan:
    name: Security Scan
    needs: [detect, build]
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_security }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  docker-build:
    name: Docker Build & Push
    needs: [detect, test-and-lint]
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_docker && needs.detect.outputs.has_dockerfile == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.detect.outputs.docker_registry }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect.outputs.docker_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [detect, docker-build]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.detect.outputs.deploy_target != '' &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    environment:
      name: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Deploy
        uses: docaohieu2808/reusable-workflows/actions/deploy@master
        with:
          deploy_target: ${{ needs.detect.outputs.deploy_target }}
          deploy_host: ${{ needs.detect.outputs.deploy_host }}
          deploy_user: ${{ needs.detect.outputs.deploy_user }}
          deploy_path: ${{ needs.detect.outputs.deploy_path }}
          deploy_port: ${{ needs.detect.outputs.deploy_port }}
          docker_image: ${{ needs.detect.outputs.docker_image }}
          k8s_namespace: ${{ needs.detect.outputs.k8s_namespace }}
          helm_chart: ${{ needs.detect.outputs.helm_chart }}
          helm_release: ${{ needs.detect.outputs.helm_release }}
          s3_bucket: ${{ needs.detect.outputs.s3_bucket }}
          cloudfront_id: ${{ needs.detect.outputs.cloudfront_id }}
          language: ${{ needs.detect.outputs.language }}
          ref: ${{ github.sha }}
          repository: ${{ github.repository }}
        secrets:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
