name: Auto Pipeline

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        type: string
        required: false
        default: "20"
      java_version:
        description: "Java version"
        type: string
        required: false
        default: "17"
      go_version:
        description: "Go version"
        type: string
        required: false
        default: "1.22"
      python_version:
        description: "Python version"
        type: string
        required: false
        default: "3.12"
      skip_tests:
        description: "Skip running unit tests"
        type: string
        required: false
        default: "false"
      skip_lint:
        description: "Skip lint step"
        type: string
        required: false
        default: "false"
      skip_security:
        description: "Skip security scan step"
        type: boolean
        required: false
        default: false
      deploy_target:
        description: "Deploy target (ssh-build|docker-compose|s3-cloudfront|rsync|k8s|helm|vercel|netlify|fly-io|railway)"
        type: string
        required: false
        default: ""
      deploy_host:
        description: "SSH hostname/IP for ssh-based deploy targets"
        type: string
        required: false
        default: ""
      deploy_user:
        description: "SSH deploy user"
        type: string
        required: false
        default: "deploy"
      deploy_path:
        description: "Remote deploy path"
        type: string
        required: false
        default: "/opt/app"
      deploy_port:
        description: "SSH port"
        type: string
        required: false
        default: "22"
      docker_registry:
        description: "Docker registry host (e.g. ghcr.io)"
        type: string
        required: false
        default: "ghcr.io"
      docker_image:
        description: "Docker image name (e.g. ghcr.io/org/app)"
        type: string
        required: false
        default: ""
    secrets:
      SSH_PRIVATE_KEY:
        description: "SSH private key for deploy"
        required: false
      DOCKER_REGISTRY_PASSWORD:
        description: "Docker registry password/token"
        required: false

jobs:
  detect:
    name: Detect Language
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.detect.outputs.language }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect language and project config
        id: detect
        uses: docaohieu2808/reusable-workflows/actions/detect@master

  build:
    name: Build
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build project
        uses: docaohieu2808/reusable-workflows/actions/build@master
        with:
          language: ${{ needs.detect.outputs.language }}
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          go_version: ${{ inputs.go_version }}
          python_version: ${{ inputs.python_version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist/
            build/
            target/
            out/
            public/
            .next/
            vendor/
          retention-days: 1
          if-no-files-found: ignore

  test:
    name: Test
    needs: [detect, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Run tests
        uses: docaohieu2808/reusable-workflows/actions/test@master
        with:
          language: ${{ needs.detect.outputs.language }}
          skip_tests: "false"
          skip_lint: "true"
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          go_version: ${{ inputs.go_version }}
          python_version: ${{ inputs.python_version }}

  lint:
    name: Lint
    needs: [detect, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Run linters
        uses: docaohieu2808/reusable-workflows/actions/test@master
        with:
          language: ${{ needs.detect.outputs.language }}
          skip_tests: "true"
          skip_lint: "false"
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          go_version: ${{ inputs.go_version }}
          python_version: ${{ inputs.python_version }}

  security:
    name: Security Scan
    needs: [detect, build]
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_security }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Run npm audit
        if: needs.detect.outputs.language == 'node'
        shell: bash
        run: |
          npm audit --audit-level=high 2>/dev/null || true

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  deploy:
    name: Deploy
    needs: [detect, build, test]
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_target != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Deploy to target
        uses: docaohieu2808/reusable-workflows/actions/deploy@master
        with:
          deploy_target: ${{ inputs.deploy_target }}
          deploy_host:   ${{ inputs.deploy_host }}
          deploy_user:   ${{ inputs.deploy_user }}
          deploy_path:   ${{ inputs.deploy_path }}
          deploy_port:   ${{ inputs.deploy_port }}
          docker_image:  ${{ inputs.docker_image }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
